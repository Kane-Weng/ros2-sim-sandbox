controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true
    ackermann_like_controller:
      type: tricycle_controller/TricycleController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

joint_state_broadcaster:
  ros__parameters:
    extra_joints: ["left_front_wheel_joint", "right_front_wheel_joint"]

ackermann_like_controller:
  ros__parameters:
    traction_joint_name: left_back_wheel_joint      # Master drive wheel
    steering_joint_name: front_left_steering_joint  # Master steering pivot
    wheel_radius: 0.228
    wheelbase: 2.082

    odom_frame_id: odom
    base_frame_id: base_link
    publish_rate: 50.0 
    open_loop: false          # Use wheel encoders to estimate position
    enable_odom_tf: true      # Broadcast transform between /odom and /base_link
    odom_only_twist: false 
    pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.01]
    velocity_rolling_window_size: 10

    traction:
      max_acceleration: 0.8
      max_deceleration: 7.0
    steering:
      min_position: -0.2618
      max_position: 0.2618
      max_velocity: 1.0

    cmd_vel_timeout: 500
    use_stamped_vel: false