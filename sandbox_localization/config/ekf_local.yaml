### ekf_local.yaml
ekf_filter_node_odom:
  ros__parameters:
    use_sim_time: true
    frequency: 20.0
    sensor_timeout: 0.1
    two_d_mode: true      # 2D flat floor movement
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom   # For local fusion

    odom0: /ackermann_like_controller/odom
    odom0_config: [true,  true,  false, 
                   false, false, true, 
                   true,  true,  false, 
                   false, false, true, 
                   false, false, false]

    imu0: /imu/data
    imu0_config: [false, false, false, 
                  false, false, true, 
                  false, false, false, 
                  false, false, true, 
                  true,  true,  false]
    imu0_differential: false  # Use absolute orientation values from the IMU
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true