### ekf_global.yaml
navsat_transform:
  ros__parameters:
    use_sim_time: true
    magnetic_declination_radians: 0.0 # Set to 0.0 for Gazebo
    yaw_offset: 3.1415926             # Heading Correction / REP-103: East-North-Up for x-y-z
    publish_filtered_gps: false       # For clean lat/lon coordinates; turn on if needed
    wait_for_datum: false             # Use first GPS fix as origin
    transform_timeout: 0.1
    delay: 3.0
    zero_altitude: true

ekf_filter_node_map:
  ros__parameters:
    use_sim_time: true
    frequency: 20.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    odom0: /ackermann_like_controller/odom
    odom0_config: [true,  true,  false,   
                   false, false, true,    
                   true,  true,  false,   
                   false, false, true,    
                   false, false, false]   
                   
    imu0: /imu/data
    imu0_config: [false, false, false, 
                  false, false, true, 
                  false, false, false, 
                  false, false, true, 
                  true,  true,  false]
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true

    odom1: /odometry/gps
    odom1_config: [true,  true,  false, 
                   false, false, false, 
                   false, false, false, 
                   false, false, false, 
                   false, false, false]
    odom1_differential: false       